<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - StackShop</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-[#F0F0DB] font-sans flex min-h-screen text-[#30364F]">

    <aside class="w-64 bg-[#30364F] flex flex-col flex-shrink-0 shadow-xl z-10">
        <div class="p-6 flex items-center gap-3 text-[#F0F0DB]">
            <svg class="w-8 h-8" fill="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" />
            </svg>
            <span class="text-xl font-bold tracking-wide"><a href="{% url 'home' %}">StackShop</a></span>
        </div>

        <nav class="flex-1 mt-6 flex flex-col">
            <a href="{% url 'customer_dashboard' %}"
                class="flex items-center gap-4 px-8 py-3 text-[#ACBAC4] hover:text-[#F0F0DB] hover:bg-white/5 transition-colors text-sm font-medium">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z">
                    </path>
                </svg>
                Dashboard
            </a>
            <a href="#"
                class="flex items-center gap-4 px-8 py-3 text-[#ACBAC4] hover:text-[#F0F0DB] hover:bg-white/5 transition-colors text-sm font-medium">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path>
                </svg>
                Shop
            </a>
            <a href="#"
                class="flex items-center gap-4 px-8 py-3 text-[#ACBAC4] hover:text-[#F0F0DB] hover:bg-white/5 transition-colors text-sm font-medium">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01">
                    </path>
                </svg>
                Orders
            </a>
            <a href="#"
                class="flex items-center gap-4 px-8 py-3 text-[#F0F0DB] bg-white/10 border-l-4 border-[#E1D9BC] transition-colors text-sm font-medium">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                </svg>
                Profile
            </a>
            <a href="#"
                class="flex items-center gap-4 px-8 py-3 text-[#ACBAC4] hover:text-[#F0F0DB] hover:bg-white/5 transition-colors text-sm font-medium">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z">
                    </path>
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                </svg>
                Settings
            </a>
        </nav>

        <div class="mt-auto border-t border-white/10">
            <a href="{%url 'logout'%}"
                class="flex items-center gap-4 px-8 py-5 text-[#ACBAC4] hover:text-[#F0F0DB] hover:bg-white/5 transition-colors text-sm font-medium">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1">
                    </path>
                </svg>
                Logout
            </a>
        </div>
    </aside>

    <main class="flex-grow flex flex-col items-center justify-center p-8 overflow-y-auto">

        <div class="bg-white rounded-xl shadow-sm w-full max-w-4xl p-10 lg:p-14">

            <h2 class="text-2xl font-bold text-[#30364F] mb-8">
                My Profile -- <span class="text-end">hii <b> {{user.first_name}}</b></span>
            </h2>

            <form method="POST" enctype="multipart/form-data" class="space-y-8">
                {% csrf_token %}

                <!-- Profile Image Section -->
                <div class="flex items-center gap-6">

                    {% if user.profile_image %}
                    <img src="{{ user.profile_image.url }}"
                        class="w-24 h-24 rounded-full object-cover border-2 border-[#ACBAC4]">
                    {% else %}
                    <div class="w-24 h-24 rounded-full bg-gray-200 flex items-center justify-center text-gray-400">
                        No Image
                    </div>
                    {% endif %}

                    <div>
                        <label class="block text-xs font-bold text-[#30364F] uppercase mb-2">
                            Update Profile Picture
                        </label>

                        <input type="file" name="profile_photo" accept="image/*" class="block w-full text-sm text-[#ACBAC4]
                       file:mr-4 file:py-2 file:px-4
                       file:rounded-lg file:border file:border-[#ACBAC4]
                       file:text-xs file:font-bold
                       file:bg-transparent file:text-[#ACBAC4]
                       hover:file:bg-[#F0F0DB] hover:file:text-[#30364F]
                       cursor-pointer transition-colors">
                    </div>
                </div>

                <!-- Form Grid -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

                    <div>
                        <label class="block text-xs font-bold text-[#30364F] uppercase mb-2">
                            First Name
                        </label>
                        <input type="text" name="first_name" value="{{ user.first_name }}" class="w-full px-4 py-3 border border-[#ACBAC4] rounded-lg 
                    focus:outline-none focus:border-[#30364F] focus:ring-1 focus:ring-[#30364F] transition">
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-[#30364F] uppercase mb-2">
                            Last Name
                        </label>
                        <input type="text" name="last_name" value="{{ user.last_name }}" class="w-full px-4 py-3 border border-[#ACBAC4] rounded-lg 
                    focus:outline-none focus:border-[#30364F] focus:ring-1 focus:ring-[#30364F] transition">
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-[#30364F] uppercase mb-2">
                            Phone Number
                        </label>
                        <input type="tel" name="phone" value="{{ user.phone_number }}" class="w-full px-4 py-3 border border-[#ACBAC4] rounded-lg 
                    focus:outline-none focus:border-[#30364F] focus:ring-1 focus:ring-[#30364F] transition">
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-[#30364F] uppercase mb-2">
                            Email Address
                        </label>
                        <input type="email" name="email" value="{{ user.email }}" readonly class="w-full px-4 py-3 border border-[#ACBAC4]/50 rounded-lg 
                    bg-gray-100 text-gray-500 cursor-not-allowed">
                    </div>

                    <div class="md:col-span-2">
                        <label class="block text-xs font-bold text-[#30364F] uppercase mb-2">
                            Username
                        </label>
                        <input type="text" name="username" value="{{ user.username }}" disabled class="w-full px-4 py-3 border border-[#ACBAC4]/50 rounded-lg 
                    bg-gray-100 text-gray-500 cursor-not-allowed">
                    </div>

                </div>

                <!-- Buttons -->
                <div class="flex justify-end gap-4 pt-6 border-t">

                    <button type="button" class="px-6 py-2 text-sm font-bold text-[#ACBAC4] 
                hover:text-[#30364F] transition">
                        Cancel
                    </button>

                    <button type="submit" class="px-8 py-3 bg-[#30364F] text-[#F0F0DB] 
                rounded-lg text-sm font-bold 
                hover:opacity-90 shadow-md transition">
                        Save Changes
                    </button>

                </div>

            </form>
        </div>

        <div class="mt-8 flex gap-8 text-xs font-bold text-[#ACBAC4]">
            <a href="#" class="hover:text-[#30364F] transition-colors uppercase">Privacy Policy</a>
            <a href="#" class="hover:text-[#30364F] transition-colors uppercase">Security Settings</a>
            <a href="#" class="hover:text-[#30364F] transition-colors uppercase">Request Account Data</a>
        </div>

    </main>
</body>

</html>
